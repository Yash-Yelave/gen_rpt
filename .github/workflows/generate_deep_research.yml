name: Generate HTML Thought Leadership Report

on:
  push:
    branches:
      - main
    paths:
      - 'gen_rpt/**'
      - 'tests/**'
      - 'tools/**'
      - '.github/workflows/generate_deep_research.yml'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      topic:
        description: English thought-leadership topic.
        required: false
        default: Nuclear fusion commercialization outlook and strategic implications
        type: string
      slug:
        description: Optional custom output directory slug
        required: false
        default: ""
        type: string
      model:
        description: DeepSeek model name
        required: false
        default: deepseek-chat
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: gen-rpt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-report:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'Add generated HTML thought leadership report')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GEN_RPT_PER_QUERY: 5
      GEN_RPT_MAX_SOURCES: 32
      GEN_RPT_MAX_QUERIES: 24
      GEN_RPT_GDELT_QUERIES: 2
      GEN_RPT_GDELT_TIMESPAN: 36months
      GEN_RPT_FETCH_TIMEOUT: 18
      MAX_AI_SECTION_IMAGES: 12
      AI_IMAGE_TIMEOUT: 45
      AI_IMAGE_RETRIES: 3
      SHOW_FALLBACK_IMAGES: true
      TOPIC_INPUT: ${{ inputs.topic || '' }}
      SLUG_INPUT: ${{ inputs.slug || '' }}
      MODEL_INPUT: ${{ inputs.model || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print run estimates
        run: |
          echo "Expected step timings for this workflow:"
          echo "- Checkout: 15-45s, slower when generated report artifacts make the repo large."
          echo "- Setup Python: 5-20s."
          echo "- Python syntax check: <10s."
          echo "- Install dependencies: 20-90s on a warm network, up to 3m on a cold runner."
          echo "- HTML smoke test: 5-20s."
          echo "- Secret validation: <5s."
          echo "- Generate report: 4-10m typical; up to 20-35m if external search, DeepSeek, or image retries are slow."
          echo "- Audit generated report: <10s."
          echo "- Commit and push generated report: 5-60s depending on artifact size and remote contention."

      - name: Python syntax check
        run: |
          echo "[estimate] Python syntax check should finish in <10s."
          python -m compileall -q gen_rpt tests tools

      - name: Install dependencies
        run: |
          echo "[estimate] Dependency install usually takes 20-90s; cold runners can take up to 3m."
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run HTML smoke test
        env:
          DISABLE_AI_IMAGES: true
        run: |
          echo "[estimate] HTML smoke test should finish in 5-20s."
          python tests/smoke_test_web_report.py

      - name: Validate secret
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "[estimate] Secret validation should finish in <5s."
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "Missing DEEPSEEK_API_KEY secret" >&2
            exit 1
          fi

      - name: Generate report
        id: generate_report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          echo "[estimate] Generate report usually takes 4-10m; upper bound is 20-35m when external APIs retry."
          TOPIC="$TOPIC_INPUT"
          SLUG="$SLUG_INPUT"
          MODEL="$MODEL_INPUT"

          if [ -z "$TOPIC" ]; then
            TOPIC="Nuclear fusion commercialization outlook and strategic implications"
          fi
          if [ -z "$MODEL" ]; then
            MODEL="deepseek-chat"
          fi
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ -z "$SLUG" ]; then
            SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
            SLUG="auto-smoke-nuclear-fusion-${SHORT_SHA}"
          fi

          mkdir -p reports_web
          GEN_LOG="reports_web/generation-${GITHUB_RUN_ID:-local}.log"
          START_TS="$(date +%s)"
          echo "Generation context:"
          echo "- topic: $TOPIC"
          echo "- slug: ${SLUG:-<auto>}"
          echo "- model: $MODEL"
          echo "- log: $GEN_LOG"
          echo "- heartbeat: every 15s until python exits"

          python -u -m gen_rpt.main_web \
            --topic "$TOPIC" \
            --slug "$SLUG" \
            --language en \
            --model "$MODEL" \
            --out-root reports_web > "$GEN_LOG" 2>&1 &
          GEN_PID="$!"

          while kill -0 "$GEN_PID" 2>/dev/null; do
            sleep 15
            NOW_TS="$(date +%s)"
            ELAPSED="$((NOW_TS - START_TS))"
            echo "[heartbeat] Generate report still running | elapsed=${ELAPSED}s | typical=4-10m | slow_external_api_upper=20-35m"
            if [ -s "$GEN_LOG" ]; then
              echo "[heartbeat] Last generator log lines:"
              tail -n 20 "$GEN_LOG"
            else
              echo "[heartbeat] Generator log file is still empty; likely waiting on first external API call."
            fi
          done

          set +e
          wait "$GEN_PID"
          GEN_STATUS="$?"
          set -e

          echo "::group::Full generator log"
          if [ -f "$GEN_LOG" ]; then
            cat "$GEN_LOG"
          else
            echo "Generator log file was not created."
          fi
          echo "::endgroup::"

          if [ "$GEN_STATUS" -ne 0 ]; then
            echo "Generator failed with exit code $GEN_STATUS" >&2
            exit "$GEN_STATUS"
          fi

          REPORT_DIR="$(find reports_web -maxdepth 1 -type d -name "$(date -u +%F)-*" -printf '%T@ %p\n' | sort -nr | head -1 | cut -d' ' -f2-)"
          if [ -z "$REPORT_DIR" ]; then
            echo "Could not locate generated report directory" >&2
            exit 1
          fi
          echo "report_dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"

      - name: Audit generated report
        run: |
          echo "[estimate] Audit should finish in <10s."
          python tools/local_web_report_audit.py "${{ steps.generate_report.outputs.report_dir }}"

      - name: Commit generated report back to repo
        run: |
          set -euo pipefail
          echo "[estimate] Commit and push usually takes 5-60s depending on artifact size and remote contention."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain reports_web)" ]; then
            git add reports_web
            git commit -m "Add generated HTML thought leadership report"
            git pull --rebase origin main
            git push
          else
            echo "No report changes to commit"
          fi

      # ── R2: Check secrets are configured ──────────────────────────────────
      # NOTE: GitHub Actions does not expose secret values in if: expressions
      # via env.*. The only reliable pattern is a dedicated step that reads
      # the secret and sets an output flag, then subsequent steps gate on that.
      - name: Check R2 secrets
        id: check_r2
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        run: |
          if [ -n "$R2_ACCOUNT_ID" ] && [ -n "$R2_ACCESS_KEY_ID" ] && [ -n "$R2_SECRET_ACCESS_KEY" ] && [ -n "$R2_BUCKET" ]; then
            echo "has_r2_secrets=true" >> "$GITHUB_OUTPUT"
            echo "R2 secrets are configured — upload steps will run."
          else
            echo "has_r2_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::R2 secrets not configured — upload steps will be skipped."
          fi

      # ── R2: Install storage dependencies ──────────────────────────────────
      - name: Install R2 storage dependencies
        if: steps.check_r2.outputs.has_r2_secrets == 'true'
        run: |
          pip install -r storage/requirements.txt

      # ── R2: Upload report ──────────────────────────────────────────────────
      - name: Upload report to R2
        if: steps.check_r2.outputs.has_r2_secrets == 'true'
        continue-on-error: true
        env:
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          STORAGE_LOG_DIR:      /tmp/storage-logs
        run: |
          set -euo pipefail
          REPORT_DIR="${{ steps.generate_report.outputs.report_dir }}"
          if [ -z "$REPORT_DIR" ]; then
            echo "::warning::No report directory found — skipping R2 upload."
            exit 0
          fi
          echo "Uploading report to R2: $REPORT_DIR"
          python -m storage.upload_report \
            --report-dir "$REPORT_DIR" \
            --status generated \
            --log-level INFO
          echo "R2 report upload complete."

      # ── R2: Upload storage logs as artifact ──────────────────────────────────
      - name: Upload R2 storage logs
        if: steps.check_r2.outputs.has_r2_secrets == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: r2-storage-logs-report
          path: /tmp/storage-logs/
          retention-days: 30
          if-no-files-found: ignore


